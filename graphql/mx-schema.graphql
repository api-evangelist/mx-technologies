"""
MX Technologies GraphQL Schema
Conceptual GraphQL representation of the MX Platform API covering account aggregation,
financial data connectivity, open banking, widgets, and analytics.
MX Technologies does not publish a native GraphQL API; this schema is derived from
their REST API surface (docs.mx.com/api-reference/platform-api).
"""

scalar DateTime
scalar Date
scalar Decimal
scalar JSON

# ─────────────────────────────────────────────
# Root Operations
# ─────────────────────────────────────────────

type Query {
  # Users
  user(guid: ID!): User
  users(page: Int, recordsPerPage: Int): UserPage

  # Members
  member(userGuid: ID!, memberGuid: ID!): Member
  members(userGuid: ID!, page: Int, recordsPerPage: Int): MemberPage
  memberCredentials(userGuid: ID!, memberGuid: ID!): [MemberCredential!]!
  memberStatus(userGuid: ID!, memberGuid: ID!): MemberStatus

  # Institutions
  institution(institutionCode: String!): Institution
  institutions(name: String, supportsOauth: Boolean, page: Int, recordsPerPage: Int): InstitutionPage
  institutionCredentials(institutionCode: String!): [InstitutionCredential!]!

  # Accounts
  account(userGuid: ID!, accountGuid: ID!): Account
  accounts(userGuid: ID!, page: Int, recordsPerPage: Int): AccountPage
  accountNumbers(userGuid: ID!, accountGuid: ID!): [AccountNumber!]!
  accountOwners(userGuid: ID!, accountGuid: ID!): [AccountOwner!]!
  userAccounts(userGuid: ID!, page: Int, recordsPerPage: Int): AccountPage
  managedAccounts(userGuid: ID!, memberGuid: ID!): [Account!]!

  # Balances
  accountBalances(userGuid: ID!, accountGuid: ID!, fromDate: Date, toDate: Date): [Balance!]!

  # Transactions
  transaction(userGuid: ID!, transactionGuid: ID!): Transaction
  transactions(userGuid: ID!, accountGuid: ID, fromDate: Date, toDate: Date, page: Int, recordsPerPage: Int): TransactionPage
  transactionRule(userGuid: ID!, transactionRuleGuid: ID!): TransactionRule
  transactionRules(userGuid: ID!): [TransactionRule!]!

  # Categories
  category(guid: ID!): TransactionCategory
  categories(isDefault: Boolean): [TransactionCategory!]!

  # Merchants
  merchant(guid: ID!): Merchant
  merchantLocations(merchantGuid: ID!, page: Int): [MerchantLocation!]!

  # Statements
  statement(userGuid: ID!, memberGuid: ID!, statementGuid: ID!): Statement
  statements(userGuid: ID!, memberGuid: ID!): [Statement!]!
  statementPDF(userGuid: ID!, memberGuid: ID!, statementGuid: ID!): StatementDownload

  # Tax Documents
  taxDocument(userGuid: ID!, memberGuid: ID!, taxDocumentGuid: ID!): TaxDocument
  taxDocuments(userGuid: ID!, memberGuid: ID!): [TaxDocument!]!

  # Holdings
  holding(userGuid: ID!, holdingGuid: ID!): Holding
  holdings(userGuid: ID!, page: Int, recordsPerPage: Int): HoldingPage
  memberHoldings(userGuid: ID!, memberGuid: ID!): [Holding!]!

  # Identity & Verification
  identity(userGuid: ID!, memberGuid: ID!): Identity
  verificationStatus(userGuid: ID!, memberGuid: ID!): VerificationStatus
  accountVerification(userGuid: ID!, accountGuid: ID!): AccountVerification

  # Budgets
  budget(userGuid: ID!, budgetGuid: ID!): Budget
  budgets(userGuid: ID!): [Budget!]!
  budgetCategories(userGuid: ID!): [BudgetCategory!]!

  # Goals
  goal(userGuid: ID!, goalGuid: ID!): Goal
  goals(userGuid: ID!): [Goal!]!

  # Analytics & Insights
  monthlyExpenses(userGuid: ID!, month: Int!, year: Int!): MonthlyExpense
  monthlyIncome(userGuid: ID!, month: Int!, year: Int!): MonthlyIncome
  cashFlowProfile(userGuid: ID!): CashFlowProfile
  netWorthComponents(userGuid: ID!): [NetWorthComponent!]!
  portfolio(userGuid: ID!): Portfolio
  spendingAnalytics(userGuid: ID!, fromDate: Date, toDate: Date): SpendingAnalytics
  dataPoints(userGuid: ID!, type: DataPointType): [DataPoint!]!

  # Microdeposits
  microdeposit(guid: ID!): Microdeposit
  microdepositTransactions(microdepositGuid: ID!): [MicrodepositTransaction!]!

  # OAuth & Connect Widgets
  oauthWindow(userGuid: ID!, memberGuid: ID!): OAuthWindow
  connectToken(userGuid: ID!): ConnectToken
  widgetUrl(userGuid: ID!, widgetType: WidgetType!, config: WidgetConfigInput): WidgetUrl

  # API Keys
  apiKey(guid: ID!): APIKey
  apiKeys: [APIKey!]!
}

type Mutation {
  # Users
  createUser(input: CreateUserInput!): User!
  updateUser(guid: ID!, input: UpdateUserInput!): User!
  deleteUser(guid: ID!): DeleteResult!

  # Members
  createMember(userGuid: ID!, input: CreateMemberInput!): Member!
  updateMember(userGuid: ID!, memberGuid: ID!, input: UpdateMemberInput!): Member!
  deleteMember(userGuid: ID!, memberGuid: ID!): DeleteResult!
  aggregateMember(userGuid: ID!, memberGuid: ID!): Member!
  resumeAggregation(userGuid: ID!, memberGuid: ID!, input: ResumeAggregationInput!): Member!
  checkBalances(userGuid: ID!, memberGuid: ID!): Member!
  identifyMember(userGuid: ID!, memberGuid: ID!): Member!
  verifyMember(userGuid: ID!, memberGuid: ID!): Member!
  extendHistory(userGuid: ID!, memberGuid: ID!): Member!

  # Accounts
  createManagedAccount(userGuid: ID!, memberGuid: ID!, input: CreateAccountInput!): Account!
  updateManagedAccount(userGuid: ID!, memberGuid: ID!, accountGuid: ID!, input: UpdateAccountInput!): Account!
  deleteManagedAccount(userGuid: ID!, memberGuid: ID!, accountGuid: ID!): DeleteResult!

  # Transactions
  createManualTransaction(userGuid: ID!, accountGuid: ID!, input: CreateTransactionInput!): Transaction!
  updateTransaction(userGuid: ID!, transactionGuid: ID!, input: UpdateTransactionInput!): Transaction!
  splitTransaction(userGuid: ID!, transactionGuid: ID!, splits: [SplitInput!]!): [Transaction!]!

  # Transaction Rules
  createTransactionRule(userGuid: ID!, input: CreateTransactionRuleInput!): TransactionRule!
  updateTransactionRule(userGuid: ID!, ruleGuid: ID!, input: UpdateTransactionRuleInput!): TransactionRule!
  deleteTransactionRule(userGuid: ID!, ruleGuid: ID!): DeleteResult!

  # Categories
  createCategory(userGuid: ID!, input: CreateCategoryInput!): TransactionCategory!
  updateCategory(userGuid: ID!, guid: ID!, input: UpdateCategoryInput!): TransactionCategory!
  deleteCategory(userGuid: ID!, guid: ID!): DeleteResult!

  # Budgets
  createBudget(userGuid: ID!, input: CreateBudgetInput!): Budget!
  updateBudget(userGuid: ID!, budgetGuid: ID!, input: UpdateBudgetInput!): Budget!
  deleteBudget(userGuid: ID!, budgetGuid: ID!): DeleteResult!

  # Goals
  createGoal(userGuid: ID!, input: CreateGoalInput!): Goal!
  updateGoal(userGuid: ID!, goalGuid: ID!, input: UpdateGoalInput!): Goal!
  deleteGoal(userGuid: ID!, goalGuid: ID!): DeleteResult!

  # Microdeposits
  createMicrodeposit(input: CreateMicrodepositInput!): Microdeposit!
  verifyMicrodeposit(guid: ID!, input: VerifyMicrodepositInput!): Microdeposit!

  # API Keys
  createAPIKey(input: CreateAPIKeyInput!): APIKey!
  deleteAPIKey(guid: ID!): DeleteResult!
}

