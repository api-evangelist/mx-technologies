- term: status
  type: string
  description: 'The status of the transaction.


    All transaction data on our systems represent what we get through our data feed
    which depends what institutions make available for aggregation. Many institutions
    do not provide data for pending transactions; transactions from those accounts
    always have a status of `POSTED`.


    When we do receive data for pending transactions, a single transaction may be
    updated from `PENDING` to `POSTED` and keep the same `guid`. This is done through
    various matching methods performed automatically by MX.


    If a single transaction can''t be updated, the `PENDING` transaction will often
    be deleted and replaced with a new `POSTED` transaction (with a new `guid`) when
    it is sent to us; this is the most common scenario when pending data is available.


    In unusual circumstances, there may be separate `PENDING` and `POSTED` transactions
    on MX systems for up to 14 days. All `PENDING` transactions are deleted after
    14 days as a failsafe.

    '
  nullable: true
  source_schema: TransactionResponse
