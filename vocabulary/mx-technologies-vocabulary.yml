    Load the widget into a specific member that contains an error or requires multifactor
    authentication. The widget will determine the best view to load based on the member''s
    current state.


    This option takes precedence over `current_institution_code` and `current_institution_guid`.

    '
  nullable: true
  source_schema: WidgetRequest
- term: current_microdeposit_guid
  type: string
  description: Only use this option if the `widget_type` is set to `connect_widget`.
    This loads the Connect Widget to whichever step the microdeposit process is currently
    in, which may be the verify amounts step, an error state, and so on. This field
    is required if attempting to load a specific microdeposit for end users to enter
    amounts.
  nullable: false
  source_schema: WidgetRequest
- term: deep_link_params
  type: object
  description: ''
  nullable: false
  source_schema: WidgetRequest
- term: disable_background_agg
  type: boolean
  description: 'Only use this option if the `widget_type` is set to `connect_widget`.
    This determines whether background aggregation is enabled or disabled for the
    `member` created by the Connect Widget. Defaults to `false` in `aggregation` mode
    and `true` in `verification` mode. A global default for all members can be set
    by reaching out to MX.

    '
  nullable: false
  source_schema: WidgetRequest
- term: disable_institution_search
  type: boolean
  description: 'Only use this option if the `widget_type` is set to `connect_widget`.


    When set to `true`, the institution search feature in the Connect Widget will
    be disabled and end users will not be able to navigate to it. Defaults to `false`.


    This option must be used with `current_institution_code`, `current_institution_guid`,
    or `current_member_guid`.

    '
  nullable: true
  source_schema: WidgetRequest
- term: include_identity
  type: boolean
  description: 'You should use `data_request.products` instead to set your products.


    Only use this option if the `widget_type` is set to `connect_widget`. This determines
    whether an account owner identification (AOI, previously called identity verification)
    is run in addition to the process specified by the mode. Defaults to `false`.
    This can be set in either `aggregation` or `verification` mode. The AOI runs after
    the primary process is complete.

    '
  nullable: false
  source_schema: WidgetRequest
- term: include_transactions
  type: boolean
  description: 'You should use `data_request.products` instead to set your products.


    Only use this option if the `widget_type` is set to `connect_widget`. This determines
    whether transaction data are retrieved. Defaults to `true` in `aggregation` mode
    and `false` in `verification` mode. This can be set in either aggregation or verification
    mode. This option does not affect future foreground or background aggregations.

    '
  nullable: false
  source_schema: WidgetRequest
- term: insight_guid
  type: string
  description: 'Only use this option if the `widget_type` is set to `pulse_widget`.
    Set this to the insight guid you want to appear at the top of the insights feed.

    '
  nullable: true
  source_schema: WidgetRequest
- term: is_mobile_webview
  type: boolean
  description: 'This option is for every `widget_type`. This configures the widget
    to render in a mobile WebView. JavaScript event postMessages are replaced with
    URL updates.

    '
  nullable: false
  source_schema: WidgetRequest
- term: microwidget_instance_id
  type: string
  description: 'Only use this option if the `widget_type` is set to `micro_pulse_carousel_widget`.
    Set this to a unique value for each instance of the Micro Widget. This lets us
    collect unique data for each instance of the widget.

    '
  nullable: true
  source_schema: WidgetRequest
- term: locale
  type: string
  description: "Sets the language of the widget. \n\nIf you're requesting the Connect\
    \ or Connections Widgets, you must use the Accept-Language header.\n"
  nullable: false
  source_schema: WidgetRequest
- term: mode
  type: string
  description: 'Only use this option if the `widget_type` is set to `connect_widget`.
    `mode` is the most important option for the Connect Widget. This determines what
    kind of process Connect will run, which affects how you should set many other
    options. Defaults to `aggregation`. `aggregation` mode retrieves account and transaction
    data; in other words, this runs a standard aggregation. `verification` mode retrieves
    account numbers and routing/transit numbers; in other words, it runs an Instant
    Account Verification (IAV). By default, verification mode does not retrieve transaction
    data; this default can be modified with secondary options. By default, background
    aggregation is disabled for all members created in verification mode; this default
    can be modified with secondary options.

    '
  nullable: false
  source_schema: WidgetRequest
- term: oauth_referral_source
  type: string
  description: 'Only use this option if the `widget_type` is set to `connect_widget`.
    This determines how MX will respond to the result of an OAuth flow. When set to
    `APP`, MX will redirect to the URI specified in the `ui_message_webview_url_scheme`.
    When set to `BROWSER`, MX will send a postMessage but not redirect. If `is_mobile_webview`
    is `true`, this defaults to `APP`. If false, it defaults to `BROWSER`.

    '
  nullable: false
  source_schema: WidgetRequest
- term: style
  type: string
  description: ''
  nullable: false
  source_schema: WidgetRequest
- term: ui_message_version
  type: integer
  description: 'This option is for all `widget_type`s. This determines which version
    of postMessage events are triggered. Defaults to 4. All new implementations must
    use version 4. Prior versions are deprecated.

    '
  nullable: false
  source_schema: WidgetRequest
- term: update_credentials
  type: boolean
  description: 'Only use this option if the `widget_type` is set to `connect_widget`.
    Load the widget into a view that allows them to update the current member. Optionally
    used with `current_member_guid`. This option should be used sparingly. The best
    practice is to use `current_member_guid` and let the widget resolve the issue.

    '
  nullable: false
  source_schema: WidgetRequest
- term: widget_type
  type: string
  description: 'This determines which widget URL you''ll receive.


    See [Widget Types](https://docs.mx.com/api-reference/platform-api/reference/widgets)
    for a list of potential values. Additional request parameters may only apply to
    some widget types.

    '
  nullable: false
  source_schema: WidgetRequest
