- term: available_balance
  type: number
  description: 'The balance that is available for use in asset accounts like checking
    and savings.


    `PENDING` transactions are typically (not always) taken into account with the
    available balance.


    `available_balance` will usually be a positive value for all account types, determined
    in the same way as the balance field.

    '
  nullable: true
  source_schema: AccountResponse
- term: available_credit
  type: number
  description: 'The amount of credit available for use in liability accounts like
    credit cards and lines of credit.


    `PENDING` transactions are typically (not always) taken into account with available
    credit.


    `available_credit` will usually be a positive value for all account types, determined
    in the same way as the `balance` field.

    '
  nullable: true
  source_schema: AccountResponse
- term: balance
  type: number
  description: "The current balance of the account.\n\n`PENDING` transactions are\
    \ typically not taken into account with the current balance, but this may not\
    \ always be the case.\n    \nThe balance will usually be a positive value for\
    \ all account types. Asset-type accounts (`CHECKING`, `SAVINGS`, `INVESTMENT`)\
    \ may have a negative balance if they are in overdraft.\n\nDebt-type accounts\
    \ (`CREDIT_CARD`, `LOAN`, `LINE_OF_CREDIT`, `MORTGAGE`) may have a negative balance\
    \ if they are overpaid.\n"
  nullable: true
  source_schema: AccountResponse
