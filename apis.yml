description: 'MX Technologies is a financial data connectivity platform that provides
  REST APIs for account aggregation, data cleansing, transaction categorization, and
  open banking connectivity across more than 16,000 financial institutions. The platform
  powers money experiences for over 2,000 banks, credit unions, and fintechs by turning
  raw, unstructured financial data into actionable intelligence. MX offers a suite
  of APIs including the Platform API for core aggregation and data services, the Atrium
  legacy API, SSO and authentication APIs, and a Data Access API built to FDX standards
  for permissioned open banking data sharing. Developers have access to OpenAPI specifications,
  SDKs in Node.js, Python, Java, Ruby, and Go, plus a hosted Connect Widget for rapid
  integration.

  '
